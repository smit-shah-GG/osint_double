# Docker Compose for OSINT System development services.
# Provides one-command Neo4j startup for local graph database development.
#
# Usage:
#   docker compose up -d          # Start Neo4j
#   docker compose down           # Stop Neo4j
#   docker compose logs neo4j     # View logs
#
# Override ports and auth via environment variables or .env file:
#   NEO4J_HTTP_PORT=7474  NEO4J_BOLT_PORT=7687
#   NEO4J_USER=neo4j      NEO4J_PASSWORD=osint_dev_password

services:
  neo4j:
    image: neo4j:2025-community
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-osint_dev_password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
