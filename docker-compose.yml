# Docker Compose for OSINT System development services.
# Provides PostgreSQL (+ pgvector) and Memgraph (+ MAGE algorithms).
#
# Usage:
#   docker compose up -d                # Start all services
#   docker compose down                 # Stop all services
#   docker compose logs postgres        # View PostgreSQL logs
#   docker compose logs memgraph        # View Memgraph logs
#   docker compose ps                   # Check health status
#
# PostgreSQL credentials (override via .env):
#   POSTGRES_USER=osint  POSTGRES_PASSWORD=osint_dev_password  POSTGRES_DB=osint
#
# Memgraph uses Bolt protocol on port 7687 (same as Neo4j).
# The neo4j Python driver works unchanged against Memgraph.

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-osint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-osint_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-osint}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osint"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  memgraph:
    image: memgraph/memgraph-mage
    ports:
      - "${MEMGRAPH_BOLT_PORT:-7687}:7687"
      - "${MEMGRAPH_MGMT_PORT:-7444}:7444"
    volumes:
      - mgdata:/var/lib/memgraph
    command: ["--bolt-server-name-for-init=Neo4j/5.2.0"]
    restart: unless-stopped

volumes:
  pgdata:
  mgdata:
